name: Docs - GitHub Pages

# GitHub Pages Deployments sind nur vom Default-Branch (main) erlaubt.
# Automatisch: bei Push in main.
# Manuell: workflow_dispatch (nur von main aus ausfuehren).
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: "Grund fuer manuellen Deploy"
        required: false
        default: "Manuell ausgeloest"

concurrency:
  group: github-pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-docs:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload docs/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
