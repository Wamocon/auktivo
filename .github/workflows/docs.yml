name: Docs - GitHub Pages

# Veroeffentlicht das Produkthandbuch unter docs/ auf GitHub Pages
# Lauft bei Push in main wenn Dateien in docs/ geaendert wurden,
# oder kann manuell ausgeloest werden.
on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-docs:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload docs/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
