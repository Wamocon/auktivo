name: Docs - GitHub Pages

# Workflow wird ausgeloest wenn docs/**-Dateien per Push auf main geaendert werden.
# Bei pull_request-Events laeuft kein Job (GitHub Pages erlaubt Deploy nur von main).
# Die paths-Filter stellen sicher, dass der Workflow nur bei relevanten Aenderungen
# in docs/ ausgeloest wird - nicht bei jedem beliebigen Push.
on:
  push:
    paths:
      - "docs/**/*.html"
      - "docs/**/*.css"
      - "docs/**/*.js"
  workflow_dispatch:
    inputs:
      reason:
        description: "Grund fuer manuellen Deploy"
        required: false
        default: "Manuell ausgeloest"

concurrency:
  group: github-pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-docs:
    name: Deploy Produkthandbuch zu GitHub Pages
    # Nur auf main deployen - GitHub Pages environment-Schutzregeln
    # blockieren Deployments von Feature-Branches und PR-Branches.
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload docs/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
