name: Docs - GitHub Pages

# Laeuft bei jedem Push oder Pull Request wenn HTML-Dateien in docs/ geaendert wurden.
# Deployment zu GitHub Pages nur vom main-Branch (GitHub Pages-Einschraenkung).
on:
  push:
    paths:
      - "docs/**/*.html"
      - "docs/**/*.css"
      - "docs/**/*.js"
  pull_request:
    paths:
      - "docs/**/*.html"
      - "docs/**/*.css"
      - "docs/**/*.js"
  workflow_dispatch:
    inputs:
      reason:
        description: "Grund fuer manuellen Deploy"
        required: false
        default: "Manuell ausgeloest"

concurrency:
  group: github-pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-docs:
    name: Deploy Produkthandbuch zu GitHub Pages
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        # Nur auf main - GitHub Pages erlaubt Deploy nur vom konfigurierten Source-Branch
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: actions/configure-pages@v5

      - name: Upload docs/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        # Nur auf main - bei PRs und Feature-Branches wird nur der Artifact-Upload validiert
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        id: deployment
        uses: actions/deploy-pages@v4
