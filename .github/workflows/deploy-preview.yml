name: Deploy - Preview (Vercel)

# Laeuft bei Pull Requests gegen main oder manuell
# Vermeidet Doppel-Ausfuehrung: Push-Trigger (Tests) laeuft separat
on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch oder Commit fuer Preview-Deploy"
        required: false
        default: ""

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: deploy-preview-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Vercel Preview Deployment
    runs-on: ubuntu-latest

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment (preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for Vercel (preview)
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (preview)
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '### Vercel Preview Deployment\n\nPreview URL: ${{ steps.deploy.outputs.preview_url }}'
            });

      - name: Print preview URL (manueller Trigger)
        if: github.event_name == 'workflow_dispatch'
        run: echo "Preview URL ${{ steps.deploy.outputs.preview_url }}"
